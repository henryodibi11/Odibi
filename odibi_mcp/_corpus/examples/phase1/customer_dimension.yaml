pipelines:
- pipeline: ingest_customer_dim
  layer: gold
  freshness_anchor: run_completion
  nodes:
  - name: dimension_node
    enabled: true
    tags: []
    depends_on: []
    columns: {}
    read:
      connection: crm_db
      format: sql
      table: dbo.Customer
      streaming: false
      archive_options: {}
      options: {}
    write:
      connection: warehouse
      format: delta
      path: gold/dim_customer
      mode: overwrite
      partition_by: []
      zorder_by: []
      table_properties: {}
      merge_schema: false
      overwrite_schema: false
      options: {}
      skip_if_unchanged: false
    streaming: false
    transformer: dimension
    params:
      natural_key: customer_id
      surrogate_key: customer_sk
      target: gold/dim_customer
      track_cols:
      - customer_name
      - email
      - phone
      - city
      - state
    pre_sql: []
    post_sql: []
    cache: false
    on_error: fail_later
    contracts: []
    sensitive: false
