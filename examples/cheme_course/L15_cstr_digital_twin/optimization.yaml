# L15 Example 2: CSTR Operating Point Optimization
# Find optimal temperature for maximum yield

project: cstr_optimization
engine: pandas

connections:
  output:
    type: local
    path: ./output/cstr_optimization.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: optimization_pipeline
    nodes:
      - name: generate_optimization_study
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "5m"
                row_count: 288
                seed: 42

              entities:
                count: 1
                id_prefix: "OPT-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                # Sweep temperature across operating range
                - name: reactor_temp_f
                  data_type: float
                  generator:
                    type: derived
                    expression: "130.0 + row_num * 0.2"

                # Fixed inputs
                - name: feed_flow_gpm
                  data_type: float
                  generator:
                    type: constant
                    value: 50.0

                - name: feed_concentration_molL
                  data_type: float
                  generator:
                    type: constant
                    value: 2.0

                # Reaction rate increases with temperature
                - name: reaction_rate_const
                  data_type: float
                  generator:
                    type: derived
                    expression: "0.05 * 1.1 ** ((reactor_temp_f - 150.0) / 10.0)"

                # Residence time
                - name: residence_time_min
                  data_type: float
                  generator:
                    type: derived
                    expression: "500.0 / feed_flow_gpm"

                # Steady-state concentration
                - name: ss_concentration_molL
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      feed_concentration_molL /
                      (1.0 + reaction_rate_const * residence_time_min)

                # Conversion
                - name: conversion_pct
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      100.0 * (feed_concentration_molL - ss_concentration_molL) /
                      feed_concentration_molL

                # Production rate
                - name: production_rate_mol_min
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      feed_flow_gpm * (feed_concentration_molL - ss_concentration_molL) * 3.785

                # Heat duty required
                - name: heat_duty_btu_min
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      feed_flow_gpm * 8.34 * (reactor_temp_f - 70.0)

                # Simple economic objective: value - cost
                - name: profit_index
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      production_rate_mol_min * 10.0 - heat_duty_btu_min * 0.001

                # Constraint: temperature must be below degradation point
                - name: within_constraints
                  data_type: boolean
                  generator:
                    type: derived
                    expression: "reactor_temp_f < 180.0"

        write:
          connection: output
