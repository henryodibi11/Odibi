# L02 Example 2: CSTR Energy Balance
# Demonstrates mass and energy balances together

project: cstr_energy_balance
engine: pandas

connections:
  output:
    type: local
    path: ./output/cstr_balance.parquet
    format: parquet
story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: cstr_pipeline
    nodes:
      - name: generate_cstr_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1m"
                row_count: 600
                seed: 42

              entities:
                count: 1
                id_prefix: "R-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                # ─────────────────────────────────
                # INPUTS (3 DoF)
                # ─────────────────────────────────
                - name: feed_flow_gpm
                  data_type: float
                  generator:
                    type: constant
                    value: 50.0

                - name: feed_temp_f
                  data_type: float
                  generator:
                    type: random_walk
                    start: 70.0
                    drift: 0.0
                    noise: 0.5
                    min: 65.0
                    max: 75.0

                - name: heat_input_btu_min
                  data_type: float
                  generator:
                    type: random_walk
                    start: 1000.0
                    drift: 0.0
                    noise: 50.0
                    min: 0.0
                    max: 2000.0

                # ─────────────────────────────────
                # CALCULATED (2 equations, 0 DoF)
                # ─────────────────────────────────

                # From mass balance: V constant, so Fout = Fin
                - name: outlet_flow_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: "feed_flow_gpm"

                # From energy balance
                - name: reactor_temp_f
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('reactor_temp_f', 70.0) +
                      (1.0 / (500.0 * 8.34)) *
                      (feed_flow_gpm * 8.34 * (feed_temp_f - prev('reactor_temp_f', 70.0)) +
                       heat_input_btu_min)

                # ─────────────────────────────────
                # METADATA
                # ─────────────────────────────────
                - name: residence_time_min
                  data_type: float
                  generator:
                    type: derived
                    expression: "500.0 / feed_flow_gpm"

        write:`n          connection: output
