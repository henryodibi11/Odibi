# L02 Example 1: Tank Mass Balance with DoF Analysis
# Demonstrates degrees of freedom and mass balance validation

project: tank_mass_balance
engine: pandas

connections:
  output:
    type: local
    path: ./output/tank_balance.parquet
    format: parquet
story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: tank_balance_pipeline
    nodes:
      - name: generate_tank_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1m"
                row_count: 480  # 8 hours
                seed: 42

              entities:
                count: 1
                id_prefix: "TK-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                # ─────────────────────────────────
                # INPUTS (2 DoF)
                # ─────────────────────────────────
                - name: inlet_flow_gpm
                  data_type: float
                  generator:
                    type: random_walk
                    start: 100.0
                    drift: 0.0
                    noise: 2.0
                    min: 80.0
                    max: 120.0

                - name: outlet_flow_gpm
                  data_type: float
                  generator:
                    type: random_walk
                    start: 95.0
                    drift: 0.0
                    noise: 1.5
                    min: 80.0
                    max: 110.0

                # ─────────────────────────────────
                # CALCULATED (0 DoF remaining)
                # ─────────────────────────────────
                - name: tank_level_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('tank_level_ft', 10.0) +
                      (inlet_flow_gpm - outlet_flow_gpm) / (100.0 * 7.48)

                # ─────────────────────────────────
                # VALIDATION COLUMNS
                # ─────────────────────────────────
                - name: mass_balance_error_pct
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      abs((tank_level_ft - prev('tank_level_ft', 10.0)) * 100.0 * 7.48 -
                      (inlet_flow_gpm - outlet_flow_gpm)) / (inlet_flow_gpm + 0.001) * 100.0

        validate:
          tests:
            - type: range
              column: inlet_flow_gpm
              min: 0.0
              max: 200.0

            - type: range
              column: outlet_flow_gpm
              min: 0.0
              max: 200.0

            - type: range
              column: tank_level_ft
              min: 0.0
              max: 20.0

        write:`n          connection: output
