# L11 Example 2: Level-Flow Cascade Control
# Primary: tank level, Secondary: outlet flow

project: level_flow_cascade
engine: pandas

connections:
  output:
    type: local
    path: ./output/level_cascade.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: level_cascade_pipeline
    nodes:
      - name: generate_level_cascade
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "5s"
                row_count: 720
                seed: 42

              entities:
                count: 1
                id_prefix: "LC-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                # Inlet flow (disturbance)
                - name: inlet_flow_gpm
                  data_type: float
                  generator:
                    type: random_walk
                    start: 100.0
                    drift: 0.0
                    noise: 2.0
                    min: 90.0
                    max: 110.0

                # Primary setpoint (tank level)
                - name: level_sp_ft
                  data_type: float
                  generator:
                    type: constant
                    value: 10.0

                # Tank level calculation
                - name: level_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('level_ft', 10.0) +
                      (inlet_flow_gpm - outlet_flow_gpm) / (100.0 * 7.48) * 5.0

                # Primary controller: level controls flow setpoint
                - name: outlet_flow_sp_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        level_ft,
                        level_sp_ft,
                        20.0,
                        1.0,
                        3.0,
                        5.0,
                        50.0,
                        150.0,
                        true
                      )

                # Outlet flow (fast secondary loop)
                - name: outlet_flow_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('outlet_flow_gpm', 100.0) +
                      0.4 * (control_valve_pct - prev('outlet_flow_gpm', 100.0))

                # Secondary controller: flow tracks setpoint
                - name: control_valve_pct
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        outlet_flow_gpm,
                        outlet_flow_sp_gpm,
                        1.2,
                        0.2,
                        0.05,
                        5.0,
                        0.0,
                        100.0,
                        true
                      )

        write:
          connection: output
