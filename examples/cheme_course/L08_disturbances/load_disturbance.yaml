# L08 Example 1: Load Disturbance Rejection
# Demonstrates how PID handles load disturbances

project: load_disturbance
engine: pandas

connections:
  output:
    type: local
    path: ./output/load_disturbance.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: disturbance_pipeline
    nodes:
      - name: generate_disturbance_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "10s"
                row_count: 600
                seed: 42

              entities:
                count: 1
                id_prefix: "DIST-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                - name: setpoint
                  data_type: float
                  generator:
                    type: constant
                    value: 75.0

                # Load disturbance kicks in at row 200
                - name: load_disturbance
                  data_type: float
                  generator:
                    type: derived
                    expression: "0.0 if row_num < 200 else 5.0"

                # Process with disturbance
                - name: process_variable
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('process_variable', 75.0) +
                      0.1 * (prev('controller_output', 50.0) - prev('process_variable', 75.0)) -
                      load_disturbance * 0.05

                # PI controller
                - name: controller_output
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        process_variable,
                        setpoint,
                        2.0,
                        0.1,
                        0.0,
                        10.0,
                        0.0,
                        100.0,
                        true
                      )

                - name: error
                  data_type: float
                  generator:
                    type: derived
                    expression: "setpoint - process_variable"

        write:
          connection: output
          format: parquet
          path: load_disturbance.parquet
          mode: overwrite
