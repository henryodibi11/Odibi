# L00 Example 2: Tank Simulation with Parquet Output
# Same as Example 1 but writes to Parquet format

project: tank_parquet_simulation
engine: pandas

connections:
  output_parquet:
    type: local
    path: ./output/tank_data.parquet
    format: parquet
story:
  connection: output_parquet
  path: stories

system:
  connection: output_parquet
  path: .odibi/catalog

pipelines:
  - pipeline: tank_parquet_pipeline
    nodes:
      - name: generate_tank_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1m"
                row_count: 100
                seed: 42

              entities:
                count: 1
                id_prefix: "TK-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: inlet_flow_gpm
                  data_type: float
                  generator:
                    type: constant
                    value: 50.0

                - name: outlet_flow_gpm
                  data_type: float
                  generator:
                    type: constant
                    value: 45.0

                - name: tank_level_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('tank_level_ft', 10.0) +
                      (inlet_flow_gpm - outlet_flow_gpm) / 100.0

        write:`n          connection: output_parquet
