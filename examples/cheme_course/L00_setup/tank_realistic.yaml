# L00 Example 3: Realistic Tank Data with Noise
# 24 hours of data with varying flows and sensor noise

project: tank_realistic_simulation
engine: pandas

connections:
  output:
    type: local
    path: ./output/tank_realistic.parquet
    format: parquet
story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: realistic_tank_pipeline
    nodes:
      - name: generate_realistic_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1m"
                row_count: 1440  # 24 hours
                seed: 42

              entities:
                count: 1
                id_prefix: "TK-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                # Inlet flow with realistic variation
                - name: inlet_flow_gpm
                  data_type: float
                  generator:
                    type: random_walk
                    start: 50.0
                    drift: 0.0
                    noise: 0.5
                    min: 45.0
                    max: 55.0

                # Outlet flow (mostly constant but slight drift)
                - name: outlet_flow_gpm
                  data_type: float
                  generator:
                    type: random_walk
                    start: 45.0
                    drift: 0.0
                    noise: 0.2
                    min: 40.0
                    max: 50.0

                # Tank level (from mass balance)
                - name: tank_level_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('tank_level_ft', 10.0) +
                      (inlet_flow_gpm - outlet_flow_gpm) / 100.0

                # Level sensor (with measurement noise)
                - name: level_sensor_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: "tank_level_ft + sensor_noise"

                # Sensor noise (±0.1 ft)
                - name: sensor_noise
                  data_type: float
                  generator:
                    type: range
                    min: -0.1
                    max: 0.1
                    distribution: normal

        write:`n          connection: output
