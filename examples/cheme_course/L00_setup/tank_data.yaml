# L00 Example 1: Minimal Tank Simulation
# Generates simple tank level data from flow balance

project: tank_101_simulation
engine: pandas

connections:
  output_csv:
    type: local
    path: ./output/tank_data.csv
    format: csv

story:
  connection: output_csv
  path: stories

system:
  connection: output_csv
  path: .odibi/catalog

pipelines:
  - pipeline: tank_data_pipeline
    nodes:
      - name: generate_tank_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1m"
                row_count: 100
                seed: 42

              entities:
                count: 1
                id_prefix: "TK-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                # Inlet flow (constant)
                - name: inlet_flow_gpm
                  data_type: float
                  generator:
                    type: constant
                    value: 50.0

                # Outlet flow (constant)
                - name: outlet_flow_gpm
                  data_type: float
                  generator:
                    type: constant
                    value: 45.0

                # Tank level (calculated from mass balance)
                - name: tank_level_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('tank_level_ft', 10.0) +
                      (inlet_flow_gpm - outlet_flow_gpm) / 100.0

        write:
          connection: output_csv
          format: csv
          path: tank_data.csv
          mode: overwrite
