# L10 Example 2: Interacting Pressure and Flow Loops
# Pressure affects flow and vice versa

project: pressure_flow_interaction
engine: pandas

connections:
  output:
    type: local
    path: ./output/pressure_flow.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: pressure_flow_pipeline
    nodes:
      - name: generate_pf_interaction
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "5s"
                row_count: 600
                seed: 42

              entities:
                count: 1
                id_prefix: "PF-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                - name: pressure_setpoint_psi
                  data_type: float
                  generator:
                    type: constant
                    value: 50.0

                - name: flow_setpoint_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: "100.0 if row_num < 200 else 120.0"

                # Pressure (affected by flow changes)
                - name: pressure_psi
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('pressure_psi', 50.0) +
                      0.15 * (compressor_speed - prev('pressure_psi', 50.0)) -
                      0.02 * (flow_gpm - 100.0)

                # Flow (affected by pressure)
                - name: flow_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('flow_gpm', 100.0) +
                      0.2 * (valve_position - prev('flow_gpm', 100.0)) +
                      0.05 * (pressure_psi - 50.0)

                # Pressure controller
                - name: compressor_speed
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        pressure_psi,
                        pressure_setpoint_psi,
                        2.0,
                        0.1,
                        1.0,
                        5.0,
                        20.0,
                        80.0,
                        true
                      )

                # Flow controller
                - name: valve_position
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        flow_gpm,
                        flow_setpoint_gpm,
                        1.5,
                        0.08,
                        0.5,
                        5.0,
                        0.0,
                        100.0,
                        true
                      )

        write:
          connection: output
