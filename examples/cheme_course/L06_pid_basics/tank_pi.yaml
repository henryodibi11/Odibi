# L06 Example: Tank Level Control with PI Controller

project: tank_level_pi_control
engine: pandas

connections:
  output:
    type: local
    path: ./output/tank_pi.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: tank_pi_pipeline
    nodes:
      - name: generate_pi_control_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1m"
                row_count: 240
                seed: 42

              entities:
                count: 1
                id_prefix: "TK-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                # Row counter for step changes
                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                # Setpoint (step change at row 30, which is t=30min)
                - name: level_sp_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: "10.0 if row_num < 30 else 12.0"

                # Disturbance: Outlet flow varies
                - name: outlet_flow_gpm
                  data_type: float
                  generator:
                    type: random_walk
                    start: 50.0
                    drift: 0.0
                    noise: 1.0
                    min: 45.0
                    max: 55.0

                # Tank level (integrating process) - must come BEFORE controller
                - name: level_pv_ft
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('level_pv_ft', 10.0) +
                      (prev('inlet_flow_gpm', 50.0) - outlet_flow_gpm) / 100.0

                # PI Controller output (inlet valve) - uses current level_pv_ft
                - name: valve_pct
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        pv=level_pv_ft,
                        sp=level_sp_ft,
                        Kp=5.0,
                        Ki=0.5,
                        Kd=0.0,
                        dt=60,
                        output_min=0,
                        output_max=100,
                        anti_windup=True
                      )

                # Convert valve % to flow
                - name: inlet_flow_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: "valve_pct"

        write:
          connection: output
          format: parquet
          path: tank_pi.parquet
          mode: overwrite
