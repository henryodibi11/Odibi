# L07 Example 2: Cohen-Coon PID Tuning
# Demonstrates Cohen-Coon tuning for processes with significant deadtime

project: cohen_coon_tuning
engine: pandas

connections:
  output:
    type: local
    path: ./output/cohen_coon.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: cohen_coon_pipeline
    nodes:
      - name: generate_cc_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "5s"
                row_count: 720
                seed: 42

              entities:
                count: 1
                id_prefix: "CC-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                - name: setpoint
                  data_type: float
                  generator:
                    type: derived
                    expression: "100.0 if row_num < 150 else 110.0"

                # Cohen-Coon tuned PID for process with theta/tau = 0.3
                # Kp = 1.5, Ki = 0.08, Kd = 5.0
                - name: process_variable
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        prev('process_variable', 100.0),
                        setpoint,
                        1.5,
                        0.08,
                        5.0,
                        5.0,
                        0.0,
                        100.0,
                        true
                      )

                - name: controller_output_pct
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      50.0 + 1.5 * (setpoint - process_variable)

                - name: decay_ratio
                  data_type: float
                  generator:
                    type: derived
                    expression: "0.25"

        write:
          connection: output
