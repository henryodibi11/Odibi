# L07 Example 1: Ziegler-Nichols PID Tuning
# Demonstrates quarter-decay ratio tuning method

project: ziegler_nichols_tuning
engine: pandas

connections:
  output:
    type: local
    path: ./output/zn_tuning.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: zn_tuning_pipeline
    nodes:
      - name: generate_tuning_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "10s"
                row_count: 600
                seed: 42

              entities:
                count: 1
                id_prefix: "LOOP-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                # Setpoint with step change
                - name: setpoint
                  data_type: float
                  generator:
                    type: derived
                    expression: "50.0 if row_num < 100 else 60.0"

                # Process variable using Ziegler-Nichols tuned PID
                # Ku = 2.0 (ultimate gain), Pu = 60s (ultimate period)
                # ZN settings: Kp = 0.6*Ku = 1.2, Ti = 0.5*Pu = 30s, Td = 0.125*Pu = 7.5s
                # Ki = Kp/Ti = 0.04, Kd = Kp*Td = 9.0
                - name: process_variable
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        prev('process_variable', 50.0),
                        setpoint,
                        1.2,
                        0.04,
                        9.0,
                        10.0,
                        0.0,
                        100.0,
                        true
                      )

                # Controller output
                - name: controller_output
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      1.2 * (setpoint - process_variable) +
                      prev('integral_term', 0.0) +
                      9.0 * ((setpoint - process_variable) - prev('error', 0.0))

                - name: error
                  data_type: float
                  generator:
                    type: derived
                    expression: "setpoint - process_variable"

                - name: integral_term
                  data_type: float
                  generator:
                    type: derived
                    expression: "prev('integral_term', 0.0) + 0.04 * (setpoint - process_variable)"

        write:
          connection: output
