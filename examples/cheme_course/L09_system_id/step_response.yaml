# L09 Example 1: Step Response System ID
# Identify process parameters from step test

project: step_response_id
engine: pandas

connections:
  output:
    type: local
    path: ./output/step_response.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: step_response_pipeline
    nodes:
      - name: generate_step_test
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "5s"
                row_count: 600
                seed: 42

              entities:
                count: 1
                id_prefix: "TEST-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                # Step input at row 50
                - name: input_step
                  data_type: float
                  generator:
                    type: derived
                    expression: "50.0 if row_num < 50 else 55.0"

                # First-order process response: K=2.0, tau=60s, theta=15s
                - name: process_output
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('process_output', 100.0) +
                      (5.0 / 60.0) * (2.0 * input_step - prev('process_output', 100.0))

                # Calculate process gain
                - name: process_gain
                  data_type: float
                  generator:
                    type: derived
                    expression: "2.0"

                # Time constant estimate
                - name: time_constant_s
                  data_type: float
                  generator:
                    type: derived
                    expression: "60.0"

                # Percent of final value reached
                - name: pct_complete
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      100.0 * (process_output - 100.0) / (110.0 - 100.0) if row_num >= 50 else 0.0

        write:
          connection: output
