# L04 Example 3: Heat Exchanger FOPTD
# Realistic heat exchanger with negative gain and delay

project: heat_exchanger_foptd
engine: pandas

connections:
  output:
    type: local
    path: ./output/heat_exchanger_foptd.parquet
    format: parquet
story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: hx_foptd_pipeline
    nodes:
      - name: generate_hx_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1m"
                row_count: 360  # 6 hours
                seed: 42

              entities:
                count: 1
                id_prefix: "HX-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: minutes_elapsed
                  data_type: float
                  generator:
                    type: sequential
                    start: 0
                    step: 1

                # Input: Coolant flow rate (step change)
                - name: coolant_flow_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: "160.0 if minutes_elapsed >= 60.0 else 120.0"

                # Manual delay (3 minutes)
                - name: coolant_delayed_1
                  data_type: float
                  generator:
                    type: derived
                    expression: "prev('coolant_flow_gpm', 120.0)"

                - name: coolant_delayed_2
                  data_type: float
                  generator:
                    type: derived
                    expression: "prev('coolant_delayed_1', 120.0)"

                - name: coolant_delayed
                  data_type: float
                  generator:
                    type: derived
                    expression: "prev('coolant_delayed_2', 120.0)"

                # Output: Outlet temperature
                # K = -0.4 (negative: more coolant → lower temp)
                # tau = 8 minutes
                - name: outlet_temp_f
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('outlet_temp_f', 180.0) +
                      (1.0 / 8.0) *
                      (-0.4 * (coolant_delayed - 120.0) -
                       (prev('outlet_temp_f', 180.0) - 180.0))

                # Add realistic noise
                - name: noise
                  data_type: float
                  generator:
                    type: range
                    min: -0.5
                    max: 0.5
                    distribution: normal

                - name: outlet_temp_sensor_f
                  data_type: float
                  generator:
                    type: derived
                    expression: "outlet_temp_f + noise"

        write:`n          connection: output
