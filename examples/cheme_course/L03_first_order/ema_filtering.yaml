# L03 Example 2: Using EMA for Filtering
# Demonstrates exponential moving average for noise reduction

project: ema_filtering_example
engine: pandas

connections:
  output:
    type: local
    path: ./output/ema_filtering.parquet
    format: parquet
story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: ema_pipeline
    nodes:
      - name: generate_noisy_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "1s"
                row_count: 3600  # 1 hour
                seed: 42

              entities:
                count: 1
                id_prefix: "SENSOR-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                # True process value (slow-varying)
                - name: true_temperature_f
                  data_type: float
                  generator:
                    type: random_walk
                    start: 150.0
                    drift: 0.0
                    noise: 0.1
                    min: 145.0
                    max: 155.0

                # Noise
                - name: noise
                  data_type: float
                  generator:
                    type: range
                    min: -2.0
                    max: 2.0
                    distribution: normal

                # Raw sensor (noisy)
                - name: raw_sensor_f
                  data_type: float
                  generator:
                    type: derived
                    expression: "true_temperature_f + noise"

                # Filtered (using ema)
                - name: filtered_sensor_f
                  data_type: float
                  generator:
                    type: derived
                    expression: "ema('raw_sensor_f', 0.1, 150.0)"

                # Heavy filtering
                - name: heavily_filtered_f
                  data_type: float
                  generator:
                    type: derived
                    expression: "ema('raw_sensor_f', 0.05, 150.0)"

        write:`n          connection: output
