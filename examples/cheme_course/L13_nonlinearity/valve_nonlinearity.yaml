# L13 Example 1: Valve Nonlinearity and Compensation
# Shows effect of nonlinear valve characteristic

project: valve_nonlinearity
engine: pandas

connections:
  output:
    type: local
    path: ./output/valve_nonlin.parquet
    format: parquet

story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: nonlinear_valve_pipeline
    nodes:
      - name: generate_valve_nonlinearity
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "10s"
                row_count: 600
                seed: 42

              entities:
                count: 1
                id_prefix: "VALVE-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: row_num
                  data_type: int
                  generator:
                    type: derived
                    expression: "prev('row_num', -1) + 1"

                - name: flow_setpoint_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: "50.0 if row_num < 200 else 80.0"

                # Controller output (linear)
                - name: controller_signal_pct
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      pid(
                        prev('actual_flow_gpm', 50.0),
                        flow_setpoint_gpm,
                        1.5,
                        0.08,
                        1.0,
                        10.0,
                        0.0,
                        100.0,
                        true
                      )

                # Nonlinear valve: equal-percentage characteristic
                # Flow = Cv * (R^(x/100)) where R=50, x=position
                - name: valve_cv
                  data_type: float
                  generator:
                    type: derived
                    expression: "10.0 * (1.05 ** controller_signal_pct)"

                # Actual flow through nonlinear valve
                - name: actual_flow_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('actual_flow_gpm', 50.0) +
                      0.2 * (valve_cv - prev('actual_flow_gpm', 50.0))

                # Gain varies with operating point
                - name: process_gain
                  data_type: float
                  generator:
                    type: derived
                    expression: "valve_cv * 0.05 * 1.05 ** controller_signal_pct"

                - name: error_gpm
                  data_type: float
                  generator:
                    type: derived
                    expression: "flow_setpoint_gpm - actual_flow_gpm"

        write:
          connection: output
