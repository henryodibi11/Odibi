# L05 Example 2: Damping Ratio Comparison
# Compare underdamped, critically damped, and overdamped responses

project: damping_comparison
engine: pandas

connections:
  output:
    type: local
    path: ./output/damping_comparison.parquet
    format: parquet
story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: comparison_pipeline
    nodes:
      - name: generate_comparison_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "10s"
                row_count: 600  # 100 minutes
                seed: 42

              entities:
                count: 3
                id_prefix: ""
                id_list: ["underdamped", "critical", "overdamped"]

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: seconds_elapsed
                  data_type: float
                  generator:
                    type: sequential
                    start: 0
                    step: 10

                # Input step
                - name: input_step
                  data_type: float
                  generator:
                    type: derived
                    expression: "1.0 if seconds_elapsed >= 300.0 else 0.0"

                # Assign damping ratio based on entity
                - name: zeta
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      0.3 if entity_id == 'underdamped' else
                      (1.0 if entity_id == 'critical' else 2.0)

                - name: omega_n
                  data_type: float
                  generator:
                    type: constant
                    value: 0.0167  # 1.0 rad/min

                # State-space implementation
                - name: velocity
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('velocity', 0.0) +
                      10.0 *
                      (-omega_n * omega_n * prev('output', 0.0) -
                       2.0 * zeta * omega_n * prev('velocity', 0.0) +
                       omega_n * omega_n * input_step)

                - name: output
                  data_type: float
                  generator:
                    type: derived
                    expression: "prev('output', 0.0) + 10.0 * velocity"

        write:`n          connection: output
