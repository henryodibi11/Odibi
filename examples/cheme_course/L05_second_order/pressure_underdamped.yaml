# L05 Example 1: Underdamped Pressure Response
# Demonstrates second-order system with overshoot (zeta=0.3, wn=1.0)

project: pressure_second_order
engine: pandas

connections:
  output:
    type: local
    path: ./output/pressure_underdamped.parquet
    format: parquet
story:
  connection: output
  path: stories

system:
  connection: output
  path: .odibi/catalog

pipelines:
  - pipeline: pressure_pipeline
    nodes:
      - name: generate_pressure_data
        read:
          connection: null
          format: simulation
          options:
            simulation:
              scope:
                start_time: "2024-01-01T00:00:00Z"
                timestep: "10s"
                row_count: 600  # 100 minutes
                seed: 42

              entities:
                count: 1
                id_prefix: "PT-"

              columns:
                - name: entity_id
                  data_type: string
                  generator:
                    type: constant
                    value: "{entity_id}"

                - name: timestamp
                  data_type: timestamp
                  generator:
                    type: timestamp

                - name: seconds_elapsed
                  data_type: float
                  generator:
                    type: sequential
                    start: 0
                    step: 10

                # ─────────────────────────────────
                # PARAMETERS
                # ─────────────────────────────────
                - name: zeta
                  data_type: float
                  generator:
                    type: constant
                    value: 0.3  # Damping ratio

                - name: omega_n
                  data_type: float
                  generator:
                    type: constant
                    value: 0.0167  # rad/sec (1.0 rad/min)

                # ─────────────────────────────────
                # INPUT: Pressure step change
                # ─────────────────────────────────
                - name: true_pressure_psi
                  data_type: float
                  generator:
                    type: derived
                    expression: "10.0 if seconds_elapsed >= 600.0 else 0.0"

                # ─────────────────────────────────
                # STATE VARIABLES (state-space)
                # ─────────────────────────────────

                # Velocity (dx₂/dt)
                - name: velocity
                  data_type: float
                  generator:
                    type: derived
                    expression: >
                      prev('velocity', 0.0) +
                      10.0 *
                      (-omega_n * omega_n * prev('pressure_reading_psi', 0.0) -
                       2.0 * zeta * omega_n * prev('velocity', 0.0) +
                       omega_n * omega_n * true_pressure_psi)

                # Position (output)
                - name: pressure_reading_psi
                  data_type: float
                  generator:
                    type: derived
                    expression: "prev('pressure_reading_psi', 0.0) + 10.0 * velocity"

        write:`n          connection: output
